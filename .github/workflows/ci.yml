name: CI — Type Check, Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # STAGE 1: Type-check & Build
  # ──────────────────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Silverwall UIUX design system
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Silverwall UIUX design system/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: './Silverwall UIUX design system/dist'
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # STAGE 2: Playwright E2E Tests
  # ──────────────────────────────────────────────────────────
  test-e2e:
    name: 🧪 E2E Tests
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Silverwall UIUX design system
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Silverwall UIUX design system/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: './Silverwall UIUX design system/dist'

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: './Silverwall UIUX design system/playwright-report'
          retention-days: 14
